name = "lotto"
compatibility_date = "2025-01-01"

# Static-assets-only Worker serving the built SPA.
# Cloudflare project settings should use:
#   Root directory:            frontend
#   Build command:             npm run build
#   Deploy command:            npx wrangler deploy
#   (Root directory = frontend avoids the npm-workspace root that
#    made `wrangler deploy` fail from the repo root.)
[assets]
directory = "./dist"
# Serve index.html for client-side routes (React Router).
not_found_handling = "single-page-application"
