name = "lotto"
compatibility_date = "2025-01-01"
pages_build_output_dir = "frontend/dist"

# Cloudflare Pages deployment for lotto.codelabsus.com
#
# One-time setup:
#   npm --prefix frontend install
#   npm --prefix frontend run build
#   npx wrangler pages deploy frontend/dist --project-name lotto
#
# Then in the Cloudflare dashboard: Pages > lotto > Custom domains >
#   add "lotto.codelabsus.com" (CNAME is auto-created for the codelabsus.com zone).
#
# Set these as Pages environment variables (NOT secrets — they're public):
#   VITE_SUPABASE_URL
#   VITE_SUPABASE_ANON_KEY
#   VITE_APP_URL=https://lotto.codelabsus.com
