name = "lotto"
compatibility_date = "2025-01-01"

# Static-assets-only Worker serving the built SPA from the repo root.
# The repo is intentionally NOT an npm workspace so `wrangler deploy`
# can run from the root without the "workspace root" detection error.
#
# Cloudflare project (default settings work):
#   Build command:   npm run build   (installs + builds frontend/dist)
#   Deploy command:  npx wrangler deploy
[assets]
directory = "./frontend/dist"
not_found_handling = "single-page-application"
